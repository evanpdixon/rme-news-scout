name: Daily News Digest

on:
  schedule:
    # 6:00 AM Eastern (11:00 UTC during EDT, 12:00 UTC during EST)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual triggers from GitHub UI

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run News Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit updated seen_urls.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json
          git diff --cached --quiet || git commit -m "Update seen_urls.json [skip ci]"
          git push
